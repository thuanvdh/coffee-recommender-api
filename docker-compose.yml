services:
  coffee-db:
    image: postgres:16-alpine
    container_name: coffee-recommender-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danang_coffee -d danang_coffee"]
      interval: 5s
      timeout: 5s
      retries: 5

  coffee-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-recommender-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      coffee-db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
